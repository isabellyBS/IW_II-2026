<!DOCTYPE html>

<body>
    <h1>Vamos por o que aprendemos de DOM em prática né</h1>
    <p id="MT">Texto</p>
    <button onclick="mudarTexto()" id="btnMT">Mudar texto</button>
    <script>
        function mudarTexto() {
            document.querySelector('p').innerHTML = 'Texto mudado';
            document.getElementById('btnMT').innerText = 'O texto já foi alterado';
        }
    </script>

    <button onclick="btnMCF()">Mudar cor de fundo</button>
    
    <br><br>
    <h4 id="Cont">Contagem: </h4>
    <button onclick="Subtrair()">-1</button>
    <button onclick="Zerar()">0</button>
    <button onclick="Somar()">+1</button>

    <script>
        let i = 0; let cor="#f3cfd9";
        function btnMCF(){
            document.body.style.backgroundColor = cor;
            i ++;
            if (i == 1) {
                cor = "#f3ddcf";}
            else if (i == 2) {
                cor = "#eef3cf";}
            else if (i == 3) {
                cor = "#cff3d5";}
            else if (i == 4) {
                cor = "#cfe3f3";}
            else if (i == 5) {
                cor = "#efcff3";}
            else{
                i = 0;
                cor="#f3cfd9"
            }
        }


        let contagem=0;
        function Subtrair() {
            contagem--;
            document.getElementById('Cont').innerText = 'Contagem: ' + contagem;
        }

        function Zerar() {
            contagem=0;
            document.getElementById('Cont').innerText = 'Contagem: ' + contagem;
        }

        function Somar() {
            contagem++;
            document.getElementById('Cont').innerText = 'Contagem: ' + contagem;
        }
    </script>
    
</body>
